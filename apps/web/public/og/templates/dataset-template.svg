<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    OG template: Dataset pages (/datos and individual CSV/JSON downloads)
    Placeholders:
      {{DATASET_TITLE}}    e.g. "PRECIO MEDIO CARPOOLING VS BUS"
      {{DATASET_YEAR}}     e.g. "2026"
      {{ROW_COUNT}}        e.g. "12 filas"
    Brand: lime+orange gradient, monospace headers (data-oriented look).
    Size: 1200x630.
  -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0E0E0E"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1A1A1A" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Corner accents -->
  <path d="M40 40h60M40 40v60M1160 40h-60M1160 40v60M40 590h60M40 590v-60M1160 590h-60M1160 590v-60" stroke="#D4F700" stroke-width="2" fill="none"/>

  <!-- CC BY 4.0 badge -->
  <g transform="translate(80 80)">
    <rect x="0" y="0" width="220" height="36" fill="#D4F700"/>
    <text x="16" y="24" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="14" fill="#080808" letter-spacing="2">DATASET · CC BY 4.0</text>
  </g>

  <!-- Title -->
  <text x="80" y="220" font-family="'Archivo Black', sans-serif" font-size="68" fill="#F5F5F5" letter-spacing="-1">{{DATASET_TITLE}}</text>

  <!-- Year + row count -->
  <text x="80" y="280" font-family="'JetBrains Mono', monospace" font-size="20" fill="#888" letter-spacing="2">{{DATASET_YEAR}} · {{ROW_COUNT}} · CSV + JSON</text>

  <!-- Mock data visualization (bar chart placeholder) -->
  <g transform="translate(80 340)">
    <rect x="0"   y="80" width="60" height="80" fill="#D4F700" opacity="0.9"/>
    <rect x="80"  y="40" width="60" height="120" fill="#D4F700" opacity="0.8"/>
    <rect x="160" y="100" width="60" height="60" fill="#D4F700" opacity="0.7"/>
    <rect x="240" y="20" width="60" height="140" fill="#FF4F00" opacity="0.9"/>
    <rect x="320" y="60" width="60" height="100" fill="#D4F700" opacity="0.7"/>
    <rect x="400" y="50" width="60" height="110" fill="#D4F700" opacity="0.8"/>
    <rect x="480" y="0"  width="60" height="160" fill="#FF4F00" opacity="0.9"/>
    <rect x="560" y="80" width="60" height="80" fill="#D4F700" opacity="0.7"/>
    <rect x="640" y="30" width="60" height="130" fill="#D4F700" opacity="0.8"/>
    <line x1="0" y1="160" x2="720" y2="160" stroke="#2A2A2A" stroke-width="2"/>
  </g>

  <!-- Source attribution -->
  <text x="80" y="560" font-family="'Inter', sans-serif" font-weight="700" font-size="18" fill="#F5F5F5">Datos abiertos · Reutilizables con atribución</text>
  <text x="80" y="590" font-family="'JetBrains Mono', monospace" font-size="14" fill="#555">concertride.me/datos</text>
</svg>
